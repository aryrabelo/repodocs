name: Feature request
description: Propose a focused improvement to RepoDocs
title: "feat: "
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What repository-documentation problem is not solved today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed change
      description: Describe the smallest behavior that would solve it.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Which existing command, backend, or workflow did you try?
  - type: checkboxes
    id: scope
    attributes:
      label: Scope check
      options:
        - label: This request fits repository scanning, cited wiki generation, translation, publishing safety, or supported backend compatibility.
          required: true
