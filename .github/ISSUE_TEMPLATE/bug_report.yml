name: Bug report
description: Report incorrect or unexpected RepoDocs behavior
title: "bug: "
labels: [bug]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Describe the actual and expected behavior.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Provide the smallest command and repository shape that reproduce the problem. Remove private data.
      render: shell
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: RepoDocs version or commit
      placeholder: 0.1.0 or commit SHA
    validations:
      required: true
  - type: input
    id: python
    attributes:
      label: Python version
      placeholder: Python 3.13.5
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: macOS 15, Ubuntu 24.04, Windows 11
    validations:
      required: true
  - type: dropdown
    id: backend
    attributes:
      label: Backend
      options:
        - OMP
        - Claude Code
        - Codex
        - Not applicable
    validations:
      required: true
  - type: textarea
    id: extra
    attributes:
      label: Additional context
      description: Add sanitized logs or screenshots if useful.
